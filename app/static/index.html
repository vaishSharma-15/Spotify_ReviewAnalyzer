<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sonic Intelligence — Spotify Review Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet" />
<style>
  /* ===== Sonic Intelligence design system (from DESIGN.md) ===== */
  :root {
    --bg: #131313;            /* Level 0 floor */
    --surface-1: #191414;     /* bubbles / cards */
    --surface-2: #212121;     /* bot bubble */
    --surface-3: #282828;     /* input / chips / modals */
    --primary: #1DB954;       /* Spotify green */
    --primary-bright: #53e076;
    --on-primary: #003914;
    --text: #FFFFFF;
    --text-dim: #B3B3B3;
    --stroke: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    display: flex; flex-direction: column;
    height: 100dvh;
  }

  /* Header */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--stroke);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .logo {
    width: 36px; height: 36px; border-radius: 9999px;
    background: var(--primary); color: var(--on-primary);
    display: grid; place-items: center; font-weight: 800; font-size: 18px;
    flex: 0 0 auto;
  }
  header h1 {
    font-size: 20px; font-weight: 800; letter-spacing: -0.01em; margin: 0;
    line-height: 1.1;
  }
  header .sub { color: var(--text-dim); font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  header .status { margin-left: auto; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 9999px; background: var(--primary); box-shadow: 0 0 8px var(--primary); }

  /* Chat area */
  .chat {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    max-width: 860px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot  { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 12px 16px; font-size: 14px; line-height: 20px;
    border: 1px solid transparent;
  }
  .user .bubble {
    background: var(--primary); color: #0b0b0b; font-weight: 500;
    border-radius: 16px 16px 4px 16px;
  }
  .bot .bubble {
    background: var(--surface-2); color: var(--text);
    border: 1px solid var(--stroke);
    border-radius: 16px 16px 16px 4px;
    white-space: pre-wrap;
  }
  .bot .bubble :is(b, strong) { color: var(--primary-bright); }
  .cite-ref { color: var(--primary-bright); font-weight: 700; cursor: pointer; }

  /* Citation data cards */
  .cards { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; }
  .card {
    background: var(--surface-1); border: 1px solid var(--stroke);
    border-radius: 12px; padding: 12px; font-size: 13px;
  }
  .card .meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; align-items: center; }
  .tag {
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    padding: 3px 8px; border-radius: 9999px; background: var(--surface-3); color: var(--text-dim);
  }
  .tag.theme { background: rgba(29,185,84,0.15); color: var(--primary-bright); }
  .tag.neg { color: #ffb4ab; }
  .tag.pos { color: var(--primary-bright); }
  .card .num { font-weight: 800; color: var(--primary-bright); margin-right: 6px; }
  .card .body { color: var(--text); line-height: 19px; }
  .card a { color: var(--text-dim); font-size: 12px; text-decoration: none; display: inline-block; margin-top: 6px; }
  .card a:hover { color: var(--primary-bright); }

  /* Suggested prompt chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 8px; max-width: 860px; margin: 0 auto; width: 100%; }
  .chip {
    min-height: 36px; padding: 8px 14px; border-radius: 9999px;
    background: var(--surface-3); color: var(--text); border: 1px solid transparent;
    font-size: 13px; cursor: pointer; transition: border-color .15s, color .15s;
  }
  .chip:hover { border-color: var(--primary); color: var(--primary-bright); }

  /* Input */
  .composer {
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--stroke); background: var(--bg);
  }
  .composer .row { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 140px;
    background: var(--surface-3); color: var(--text);
    border: 1px solid var(--stroke); border-radius: 22px;
    padding: 12px 16px; font: inherit; font-size: 14px; line-height: 20px;
    outline: none;
  }
  textarea::placeholder { color: var(--text-dim); }
  textarea:focus { border-color: var(--primary); }
  .send {
    height: 44px; min-width: 44px; padding: 0 20px; border: none; cursor: pointer;
    border-radius: 9999px; background: var(--primary); color: #0b0b0b;
    font-weight: 700; font-size: 14px; flex: 0 0 auto;
  }
  .send:disabled { opacity: .5; cursor: default; }

  /* Loading skeleton (pulsing) */
  .skeleton { display: flex; gap: 6px; }
  .skeleton span {
    width: 8px; height: 8px; border-radius: 9999px; background: var(--text-dim);
    animation: pulse 1s infinite ease-in-out;
  }
  .skeleton span:nth-child(2){ animation-delay:.15s } .skeleton span:nth-child(3){ animation-delay:.3s }
  @keyframes pulse { 0%,100%{opacity:.3; transform:translateY(0)} 50%{opacity:1; transform:translateY(-3px)} }

  .empty { color: var(--text-dim); text-align: center; margin: 8vh auto 0; max-width: 480px; padding: 0 16px; }
  .empty h2 { color: var(--text); font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
</style>
</head>
<body>
  <header>
    <div class="logo">◎</div>
    <div>
      <h1>Sonic Intelligence</h1>
      <div class="sub">Spotify Review Discovery</div>
    </div>
    <div class="status"><span class="dot"></span><span id="status">connecting…</span></div>
  </header>

  <div class="chat" id="chat">
    <div class="empty" id="empty">
      <h2>Ask about Spotify discovery</h2>
      <p>Answers are synthesized from real user reviews, with citations and source links.</p>
    </div>
  </div>

  <div class="chips" id="chips"></div>

  <div class="composer">
    <div class="row">
      <textarea id="input" rows="1" placeholder="Ask why users struggle to discover music…"></textarea>
      <button class="send" id="send">Ask</button>
    </div>
  </div>

<script>
const SUGGESTIONS = [
  "Why do users struggle to discover new music?",
  "What are the most common frustrations with recommendations?",
  "What listening behaviors are users trying to achieve?",
  "What causes users to repeatedly listen to the same content?",
  "Which user segments experience different discovery challenges?",
  "What unmet needs emerge consistently across reviews?",
];
const chat = document.getElementById('chat');
const empty = document.getElementById('empty');
const input = document.getElementById('input');
const send = document.getElementById('send');
const chips = document.getElementById('chips');

SUGGESTIONS.forEach(s => {
  const c = document.createElement('button');
  c.className = 'chip'; c.textContent = s;
  c.onclick = () => { input.value = s; ask(); };
  chips.appendChild(c);
});

fetch('/health').then(r=>r.json()).then(d=>{
  document.getElementById('status').textContent =
    d.status === 'ok' ? `${d.indexed_reviews} reviews indexed` : 'index unavailable';
}).catch(()=>document.getElementById('status').textContent='offline');

input.addEventListener('input', () => {
  input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight,140)+'px';
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});
send.onclick = ask;

function addUser(text){
  if (empty) empty.remove();
  const m = document.createElement('div'); m.className='msg user';
  const b = document.createElement('div'); b.className='bubble'; b.textContent=text;
  m.appendChild(b); chat.appendChild(m); scroll();
}
function addBotLoading(){
  const m = document.createElement('div'); m.className='msg bot';
  const b = document.createElement('div'); b.className='bubble';
  b.innerHTML = '<div class="skeleton"><span></span><span></span><span></span></div>';
  m.appendChild(b); chat.appendChild(m); scroll(); return m;
}
function fmt(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
          .replace(/\[(\d+)\]/g,'<span class="cite-ref">[$1]</span>');
}
function renderBot(node, data){
  const b = node.querySelector('.bubble');
  b.innerHTML = fmt(data.answer || 'No answer.');
  if (data.evidence_count){
    const note = document.createElement('div');
    note.style.cssText = 'color:var(--text-dim);font-size:11px;margin-top:10px;letter-spacing:.04em;text-transform:uppercase;';
    const themes = (data.themes_analyzed||[]).join(', ');
    note.textContent = `Analyzed ${data.evidence_count} reviews` + (themes?` · themes: ${themes}`:'');
    b.parentElement.appendChild(note);
  }
  if (data.citations && data.citations.length){
    const label = document.createElement('div');
    label.style.cssText = 'color:var(--text-dim);font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:10px;';
    label.textContent = 'Key supporting reviews';
    b.parentElement.appendChild(label);
    const cards = document.createElement('div'); cards.className='cards';
    data.citations.forEach(c => {
      const card = document.createElement('div'); card.className='card';
      const neg = c.sentiment==='negative'?'neg':(c.sentiment==='positive'?'pos':'');
      card.innerHTML =
        `<div class="meta">
           <span class="tag theme">${c.theme||''}</span>
           <span class="tag ${neg}">${c.sentiment||''}</span>
           <span class="tag">${c.source||''}</span>
           <span class="tag">sev ${c.severity_score??'-'}</span>
         </div>
         <div class="body"><span class="num">[${c.n}]</span>${(c.text||'').replace(/</g,'&lt;')}</div>` +
        (c.source_url ? `<a href="${c.source_url}" target="_blank" rel="noopener">View source ↗</a>` : '');
      cards.appendChild(card);
    });
    b.parentElement.appendChild(cards);
  }
  scroll();
}
function scroll(){ chat.scrollTop = chat.scrollHeight; }

async function ask(){
  const q = input.value.trim();
  if (!q) return;
  addUser(q);
  input.value=''; input.style.height='auto';
  send.disabled = true;
  const node = addBotLoading();
  try {
    const r = await fetch('/api/query', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ question: q })
    });
    const data = await r.json();
    renderBot(node, data);
  } catch(e){
    node.querySelector('.bubble').textContent = 'Error: '+e.message;
  } finally {
    send.disabled = false; input.focus();
  }
}
</script>
</body>
</html>
